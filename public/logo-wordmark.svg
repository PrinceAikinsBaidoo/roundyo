<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="arrow" x1="28" y1="40" x2="28" y2="14" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <!-- Icon -->
  <rect width="56" height="56" rx="16" fill="url(#bg)"/>
  <circle cx="28" cy="28" r="14" stroke="white" stroke-opacity="0.25" stroke-width="2" fill="none"/>
  <path d="M28 38 L28 18" stroke="url(#arrow)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M21 25 L28 18 L35 25" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="28" cy="39" r="1.8" fill="white" fill-opacity="0.45"/>

  <!-- Wordmark: "Round" -->
  <text x="70" y="37" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="28" letter-spacing="-1" fill="white">Round</text>

  <!-- Wordmark: "YO" in indigo -->
  <text x="160" y="37" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="28" letter-spacing="-1" fill="#818cf8">YO</text>
</svg>
