<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="arrow" x1="32" y1="44" x2="32" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="18" fill="url(#bg)"/>

  <!-- Coin ring -->
  <circle cx="32" cy="32" r="16" stroke="white" stroke-opacity="0.25" stroke-width="2" fill="none"/>

  <!-- Upward arrow (round-up symbol) -->
  <path d="M32 43 L32 21" stroke="url(#arrow)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M24 29 L32 21 L40 29" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Small plus/coin dot at bottom -->
  <circle cx="32" cy="44" r="2" fill="white" fill-opacity="0.5"/>
</svg>
